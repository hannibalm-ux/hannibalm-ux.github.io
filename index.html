  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px}\n.nav-badge.live{background:rgba(255,60,92,.2);color:var(--accent-live)}\n.nav-divider{height:1px;background:var(--border-subtle);margin:8px 16px}\n.sb-stats{padding:14px 16px;margin-top:auto}\n.sstat{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}\n.sstat-lbl{color:var(--text-dim)}\n.sstat-val{color:var(--text-secondary);font-family:'JetBrains Mono',monospace}\n.net-status{display:flex;align-items:center;gap:5px;padding:8px 16px;font-size:11px;font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border-subtle);margin-top:8px}\n.net-dot{width:6px;height:6px;border-radius:50%}\n.net-online .net-dot{background:#22C55E}.net-offline .net-dot{background:#EF4444}\n.net-online{color:#4B9B5F}.net-offline{color:#9B4B4B}\n\n/* ── MAIN ── */\nmain{flex:1;overflow:hidden;display:flex;flex-direction:column}\n.main-tabs-bar{display:flex;align-items:center;gap:2px;padding:0 20px;background:var(--bg-sidebar);border-bottom:1px solid var(--border-subtle);flex-shrink:0;height:44px}\n.main-tab{display:flex;align-items:center;gap:7px;padding:0 16px;height:100%;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.3px;user-select:none}\n.main-tab:hover{color:var(--text-primary)}\n.main-tab.active{color:var(--cmd-gold);border-bottom-color:var(--cmd-gold)}\n.main-tab .tab-icon{font-size:14px}\n.tab-panel{display:none;flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}\n.tab-panel.active{display:block}\n.tab-panel::-webkit-scrollbar{width:6px}\n.tab-panel::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}\n\n/* ── SECTION HEADERS ── */\n.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle)}\n.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim)}\n.sec-line{flex:1;height:1px;background:var(--border-subtle)}\n.sec-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}\n.league-block{margin-bottom:26px}\n\n/* ── CARDS GRID ── */\n.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(296px,1fr));gap:12px}\n.game-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;border-left:3px solid transparent;padding:14px 16px;position:relative;overflow:hidden;transition:background .2s;cursor:default}\n.game-card:hover{background:var(--bg-card-hover)}\n.game-card::before{content:'';position:absolute;top:0;left:3px;right:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.07),transparent)}\n@keyframes score-flash{0%{background:rgba(255,182,18,.22)}100%{background:transparent}}\n.game-card.flashed{animation:score-flash 1.5s ease-out}\n.card-commanders{border-left-color:var(--cmd-burg)}.card-wizards{border-left-color:var(--wiz-navy)}\n.card-nationals{border-left-color:var(--nat-red)}.card-capitals{border-left-color:var(--cap-red)}\n.card-mystics{border-left-color:var(--wiz-red)}.card-spirit{border-left-color:var(--spi-gold)}\n.card-tottenham{border-left-color:var(--tot-navy)}\n.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}\n.league-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:3px}\n.tag-nfl{background:rgba(122,27,27,.3);color:#D4896A}.tag-nba{background:rgba(0,43,92,.5);color:#6EA3D4}\n.tag-mlb{background:rgba(20,34,90,.4);color:#7A9ED8}.tag-nhl{background:rgba(4,30,66,.5);color:#6A9FD8}\n.tag-wnba{background:rgba(227,24,55,.15);color:#E87A8D}.tag-nwsl{background:rgba(0,28,78,.4);color:#8AA7D4}\n.tag-epl{background:rgba(19,34,87,.5);color:#70A8D8}\n.status-pill{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;font-weight:500}\n.s-live{background:rgba(255,60,92,.15);color:var(--accent-live);border:1px solid rgba(255,60,92,.25)}\n.s-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent-live);animation:pulse 1.2s ease-in-out infinite}\n.s-final{background:rgba(74,80,104,.3);color:var(--text-dim);border:1px solid var(--border-subtle)}\n.s-pre{background:rgba(255,182,18,.08);color:#A08020;border:1px solid rgba(255,182,18,.15)}\n.matchup{display:flex;flex-direction:column;gap:5px}\n.team-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}\n.team-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0}\n.team-logo{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;flex-shrink:0;letter-spacing:.5px}\n.team-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}\n.team-rec{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}\n.team-score{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;min-width:34px;text-align:right;letter-spacing:-.5px}\n.team-score.lead{color:var(--text-primary)}.team-score.trail{color:var(--text-secondary)}.team-score.ns{font-size:13px;color:var(--text-dim)}\n.vs-divider{height:1px;background:var(--border-subtle);margin:2px 0;position:relative}\n.vs-divider::after{content:'VS';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:9px;letter-spacing:2px;color:var(--text-dim);background:var(--bg-card);padding:0 5px;font-family:'Barlow Condensed',sans-serif;font-weight:700}\n.card-foot{margin-top:9px;padding-top:8px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center}\n.game-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary)}\n.game-venue{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}\n.card-loading{display:flex;align-items:center;justify-content:center;height:80px;color:var(--text-dim);font-size:12px;gap:8px}\n.spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-mid);border-top-color:var(--text-dim);animation:spin .7s linear infinite}\n.empty-state{grid-column:1/-1;padding:32px;text-align:center;color:var(--text-dim);font-size:13px;border:1px dashed var(--border-subtle);border-radius:8px}\n\n/* ── NEWS ── */\n.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:12px}\n.news-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;border-left:3px solid transparent;overflow:hidden;transition:background .2s,transform .15s;cursor:pointer;text-decoration:none;display:flex;flex-direction:column}\n.news-card:hover{background:var(--bg-card-hover);transform:translateY(-1px)}\n.news-img{width:100%;height:126px;object-fit:cover;display:block}\n.news-nophoto{width:100%;height:126px;display:flex;align-items:center;justify-content:center;font-size:26px;opacity:.12;background:linear-gradient(135deg,var(--bg-card),var(--border-subtle))}\n.news-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:5px}\n.news-meta{display:flex;align-items:center;gap:8px}\n.news-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:3px}\n.news-time{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-left:auto}\n.news-headline{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text-primary);line-height:1.3}\n.news-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}\n@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}\n.skel{background:linear-gradient(90deg,var(--bg-card) 25%,var(--border-subtle) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}\n.skel-img{height:126px;border-radius:0}.skel-line{height:12px;margin:5px 0}.skel-short{width:55%}.skel-med{width:80%}\n\n/* ── DRAFT SECTION ── */\n.draft-hero{background:linear-gradient(135deg,rgba(0,43,92,.7) 0%,rgba(4,30,66,.9) 100%);border:1px solid rgba(0,43,92,.8);border-radius:8px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}\n.pick-badge{display:flex;flex-direction:column;align-items:center;background:rgba(255,182,18,.12);border:1px solid rgba(255,182,18,.25);border-radius:8px;padding:10px 18px;flex-shrink:0;min-width:84px}\n.pick-num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:800;color:var(--cmd-gold);line-height:1;letter-spacing:-1px}\n.pick-lbl{font-size:10px;color:rgba(255,182,18,.6);letter-spacing:2px;text-transform:uppercase;margin-top:2px}\n.draft-info{flex:1}\n.draft-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:1px;margin-bottom:3px}\n.draft-date-str{font-size:13px;color:rgba(200,210,230,.7);margin-bottom:7px}\n.draft-desc{font-size:13px;color:rgba(200,210,230,.55);line-height:1.6;max-width:580px}\n.draft-chips{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}\n.chip{padding:4px 10px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(200,210,230,.65)}\n.chip.own{background:rgba(255,182,18,.1);border-color:rgba(255,182,18,.25);color:var(--cmd-gold)}\n\n/* Countdown */\n.countdown-hero{display:flex;align-items:center;gap:16px;padding:14px 20px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid var(--border-mid);margin-bottom:16px;flex-wrap:wrap}\n.countdown-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);flex-shrink:0}\n.countdown-units{display:flex;gap:8px;align-items:center}\n.cd-unit{display:flex;flex-direction:column;align-items:center;background:rgba(0,43,92,.5);border:1px solid rgba(0,100,180,.2);border-radius:6px;padding:8px 14px;min-width:62px}\n.cd-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--cmd-gold);line-height:1;letter-spacing:-1px}\n.cd-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:3px}\n.cd-sep{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--text-dim);padding-bottom:8px}\n\n/* Draft tabs */\n.draft-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border-subtle);padding-bottom:0}\n.dtab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}\n.dtab:hover{color:var(--text-primary)}.dtab.active{color:var(--cmd-gold);border-bottom-color:var(--cmd-gold)}\n.dpanel{display:none}.dpanel.active{display:block}\n.combine-banner{padding:9px 13px;border-radius:6px;border:1px solid rgba(255,182,18,.18);background:rgba(255,182,18,.05);margin-bottom:14px;font-size:12px;color:rgba(220,200,120,.8);line-height:1.6}\n.prospects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:10px}\n.prospect-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;padding:13px;transition:background .2s,border-color .2s;position:relative;overflow:hidden;cursor:pointer}\n.prospect-card:hover{background:var(--bg-card-hover);border-color:var(--border-mid)}\n.prospect-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(0,43,92,.8),rgba(227,2 :'⚽ NWSL Matchday',desc:'Washington Spirit continue their 2026 NWSL campaign.',status:'upcoming'},\n  // TOTTENHAM\n  {team:'Tottenham',league:'EPL',primary:'#132257',secondary:'#00B2F8',date:'2026-05-11',label:'⚽ vs Leeds United — TONIGHT',desc:'Crucial relegation 6-pointer at Tottenham Hotspur Stadium. 4 PM ET / 21:00 BST. Spurs 1 point above West Ham with 3 games left.',status:'today'},\n  {team:'Tottenham',league:'EPL',primary:'#132257',secondary:'#00B2F8',date:'2026-05-18',label:'🏁 EPL Final Day',desc:'Premier League season concludes simultaneously across all grounds. Spurs must secure survival. West Ham are the immediate threat.',status:'upcoming'},\n  {team:'Tottenham',league:'EPL',primary:'#132257',secondary:'#00B2F8',date:'2026-06-10',label:'📋 Summer Transfer Window',desc:'Transfer window opens. Major squad rebuild expected under Roberto De Zerbi regardless of relegation outcome.',status:'upcoming'},\n];\n\n/* ════════════════════════════════════════════\n   STATE\n════════════════════════════════════════════ */\nlet allCards=[],prevScores={},activeLeague='all',allNews=[],activeDraftTab='prospects';\nlet activeDatesFilter='all',activeNewsFilter='all',isOnline=true,countdownSec=60,lastRefreshTime=null;\nconst DRAFT_DATE=new Date('2026-06-23T20:00:00-04:00');\n\n/* ════════════════════════════════════════════\n   CLOCK & COUNTDOWN\n════════════════════════════════════════════ */\nfunction updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}\nsetInterval(updateClock,1000);updateClock();\n\nfunction tickCountdown(){\n  countdownSec--;\n  if(countdownSec<=0){countdownSec=60;fetchAll()}\n  document.getElementById('countdownFill').style.width=(countdownSec/60*100)+'%';\n  updateDraftCountdown();\n}\nfunction resetCountdown(){countdownSec=60;document.getElementById('countdownFill').style.width='100%'}\nsetInterval(tickCountdown,1000);\n\nfunction updateDraftCountdown(){\n  const el=document.getElementById('draft-countdown');if(!el)return;\n  const diff=DRAFT_DATE-Date.now();\n  if(diff<=0){el.innerHTML='<span style=\"color:var(--cmd-gold);font-family:\\'Barlow Condensed\\',sans-serif;font-size:18px;font-weight:700\">🏀 DRAFT IS LIVE!<\u002Fspan>';return}\n  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);\n  el.innerHTML=`<span class=\"countdown-label\">Draft Night<\u002Fspan><div class=\"countdown-units\">\n    <div class=\"cd-unit\"><div class=\"cd-num\">${String(d).padStart(2,'0')}<\u002Fdiv><div class=\"cd-lbl\">Days<\u002Fdiv><\u002Fdiv>\n    <span class=\"cd-sep\">:<\u002Fspan>\n    <div class=\"cd-unit\"><div class=\"cd-num\">${String(h).padStart(2,'0')}<\u002Fdiv><div class=\"cd-lbl\">Hours<\u002Fdiv><\u002Fdiv>\n    <span class=\"cd-sep\">:<\u002Fspan>\n    <div class=\"cd-unit\"><div class=\"cd-num\">${String(m).padStart(2,'0')}<\u002Fdiv><div class=\"cd-lbl\">Min<\u002Fdiv><\u002Fdiv>\n    <span class=\"cd-sep\">:<\u002Fspan>\n    <div class=\"cd-unit\"><div class=\"cd-num\">${String(s).padStart(2,'0')}<\u002Fdiv><div class=\"cd-lbl\">Sec<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ════════════════════════════════════════════\n   TAB SWITCHING\n════════════════════════════════════════════ */\nfunction switchTab(id,el){\n  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));\n  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));\n  document.getElementById('tab-'+id).classList.add('active');\n  el.classList.add('active');\n}\n\n/* ════════════════════════════════════════════\n   SCORES — FETCH & RENDER\n════════════════════════════════════════════ */\nasync function fetchAll(){\n  setSpinning(true);\n  try{\n    const results=await Promise.allSettled(LEAGUES.map(l=>fetchLeague(l)));\n    allCards=[];results.forEach(r=>{if(r.status==='fulfilled')allCards.push(...r.value)});\n    updateGlobalStatus();updateSidebarBadges();updateSidebarStats();renderCards();\n    setOnline(true);lastRefreshTime=new Date();\n    document.getElementById('lastRefresh').textContent='Last refresh: '+lastRefreshTime.toLocaleTimeString();\n  }catch(e){setOnline(false)}\n  finally{setSpinning(false);resetCountdown()}\n}\n\nasync function fetchLeague(league){\n  const res=await fetch(league.url,{signal:AbortSignal.timeout(8000)});\n  if(!res.ok)throw new Error('HTTP '+res.status);\n  const data=await res.json();\n  const events=data.events||[];const cards=[];\n  for(const evt of events){\n    const comps=evt.competitions||[];\n    for(const comp of comps){\n      const competitors=comp.competitors||[];\n      const dcTeams=league.teams;\n      const isDC=dcTeams.some(t=>{\n        if(!t.id)return competitors.some(c=>c.team&&c.team.abbreviation===t.abbr);\n        return competitors.some(c=>c.team&&(c.team.id===t.id||String(c.team.id)===String(t.id)));\n      });\n      if(!isDC)continue;\n      const away=competitors.find(c=>c.homeAway==='away')||competitors[0]||{};\n      const home=competitors.find(c=>c.homeAway==='home')||competitors[1]||{};\n      const awayT=away.team||{},homeT=home.team||{};\n      const status=comp.status||{},stype=status.type||{};\n      const state=stype.state||'pre';\n      const awayScore=away.score||'—',homeScore=home.score||'—';\n      const gameId=evt.id||comp.id||Math.random().toString();\n      const prev=prevScores[gameId];\n      let scoreChanged=false;\n      if(state==='in'&&prev&&(prev.away!==awayScore||prev.home!==homeScore))scoreChanged=true;\n      prevScores[gameId]={away:awayScore,home:homeScore};\n      const dcCfg=dcTeams.find(t=>{\n        if(!t.id)return awayT.abbreviation===t.abbr||homeT.abbreviation===t.abbr;\n        return awayT.id===t.id||String(awayT.id)===String(t.id)||homeT.id===t.id||String(homeT.id)===String(t.id);\n      })||dcTeams[0];\n      let clockStr='';\n      if(state==='in'){const d=status.displayClock||'',p=stype.shortDetail||'';clockStr=[p,d].filter(Boolean).join(' · ')}\n      else if(state==='pre'){clockStr=evt.date?new Date(evt.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}):''}\n      else{clockStr=stype.shortDetail||'Final'}\n      const awayRec=(away.records&&away.records[0]&&away.records[0].summary)||'';\n      const homeRec=(home.records&&home.records[0]&&home.records[0].summary)||'';\n      cards.push({\n        league:league.id,leagueLabel:league.label,gameId,state,\n        awayTeam:{name:awayT.displayName||awayT.name||'Away',abbr:awayT.abbreviation||'?',record:awayRec},\n        homeTeam:{name:homeT.displayName||homeT.name||'Home',abbr:homeT.abbreviation||'?',record:homeRec},\n        awayScore,homeScore,\n        awayLeading:state!=='pre'&&parseInt(awayScore)>parseInt(homeScore),\n        homeLeading:state!=='pre'&&parseInt(homeScore)>parseInt(awayScore),\n        clockStr,venue:(comp.venue&&comp.venue.fullName)||'',teamCfg:dcCfg,scoreChanged\n      });\n    }\n  }\n  return cards;\n}\n\nfunction renderCards(){\n  const filtered=activeLeague==='all'?allCards:allCards.filter(c=>c.league===activeLeague);\n  const el=document.getElementById('scores-content');\n  if(!filtered.length){el.innerHTML='<div class=\"cards-grid\"><div class=\"empty-state\">📡 No DC team games found for today. Check back closer to game time.<\u002Fdiv><\u002Fdiv>';return}\n  const leagues=activeLeague==='all'?[...new Set(filtered.map(c=>c.league))]:[activeLeague];\n  let html='';\n  for(const lid of leagues){\n    const cards=filtered.filter(c=>c.league===lid);if(!cards.length)continue;\n    const live=cards.filter(c=>c.state==='in').length;\n    html+=`<div class=\"league-block\"><div class=\"sec-hdr\"><span class=\"sec-title\">${lid}<\u002Fspan><span class=\"sec-line\"><\u002Fspan>${live?`<span class=\"status-pill s-live\">${live} Live<\u002Fspan>`:''}<span class=\"sec-count\">${cards.length} game${cards.length!==1?'s':''}<\u002Fspan><\u002Fdiv><div class=\"cards-grid\">${cards.map(renderCard).join('')}<\u002Fdiv><\u002Fdiv>`;\n  }\n  el.innerHTML=html;\n  filtered.filter(c=>c.scoreChanged).forEach(c=>{const e=document.getElementById('gc-'+c.gameId);if(e){e.classList.remove('flashed');void e.offsetWidth;e.classList.add('flashed')}});\n}\n\nfunction renderCard(c){\n  const t=c.teamCfg;\n  const spill=c.state==='in'?`<span class=\"status-pill s-live\">LIVE<\u002Fspan>`:c.state==='post'?`<span class=\"status-pill s-final\">FINAL<\u002Fspan>`:`<span class=\"status-pill s-pre\">UPCOMING<\u002Fspan>`;\n  const show=c.state!=='pre';\n  const aScore=show?`<span class=\"team-score ${c.awayLeading?'lead':c.homeLeading?'trail':''}\">${c.awayScore}<\u002Fspan>`:`<span class=\"team-score ns\">—<\u002Fspan>`;\n  const hScore=show?`<span class=\"team-score ${c.homeLeading?'lead':c.awayLeading?'trail':''}\">${c.homeScore}<\u002Fspan>`:`<span class=\"team-score ns\">—<\u002Fspan>`;\n  const ls=`background:${t.primary};color:${t.secondary};`;\n  return `<div class=\"game-card ${t.cls}\" id=\"gc-${c.gameId}\">\n    <div class=\"card-top\"><span class=\"league-tag ${t.tag}\">${c.leagueLabel}<\u002Fspan>${spill}<\u002Fdiv>\n    <div class=\"matchup\">\n      <div class=\"team-row\"><div class=\"team-info\"><div class=\"team-logo\" style=\"${ls}\">${esc(c.awayTeam.abbr.slice(0,3))}<\u002Fdiv><div><div class=\"team-name\">${esc(c.awayTeam.name)}<\u002Fdiv>${c.awayTeam.record?`<div class=\"team-rec\">${esc(c.awayTeam.record)}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fdiv>${aScore}<\u002Fdiv>\n      <div class=\"vs-divider\"><\u002Fdiv>\n      <div class=\"team-row\"><div class=\"team-info\"><div class=\"team-logo\" style=\"${ls}\">${esc(c.homeTeam.abbr.slice(0,3))}<\u002Fdiv><div><div class=\"team-name\">${esc(c.homeTeam.name)}<\u002Fdiv>${c.homeTeam.record?`<div class=\"team-rec\">${esc(c.homeTeam.record)}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fdiv>${hScore}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card-foot\"><span class=\"game-clock\">${esc(c.clockStr)}<\u002Fspan>${c.venue?`<span class=\"game-venue\" title=\"${esc(c.venue)}\">${esc(c.venue)}<\u002Fspan>`:''}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ════════════════════════════════════════════\n   SIDEBAR\n════════════════════════════════════════════ */\nfunction updateGlobalStatus(){\n  const live=allCards.filter(c=>c.state==='in').length;\n  const el=document.getElementById('globalStatus'),txt=document.getElementById('globalStatusText');\n  el.className='global-status';\n  if(!isOnline){el.classList.add('offline');txt.textContent='OFFLINE';return}\n  if(live>0){txt.textContent=live+' GAME'+(live>1?'S':'')+' LIVE'}\n  else{el.classList.add('quiet');txt.textContent='NO LIVE GAMES'}\n}\nfunction updateSidebarBadges(){\n  ['all','NFL','NBA','MLB','NHL','WNBA','NWSL','EPL'].forEach(lid=>{\n    const rel=lid==='all'?allCards:allCards.filter(c=>c.league===lid);\n    const live=rel.filter(c=>c.state==='in').length;\n    const el=document.getElementById('b-'+lid);if(!el)return;\n    el.textContent=rel.length>0?rel.length:'—';\n    el.className='nav-badge'+(live>0?' live':'');\n  });\n}\nfunction updateSidebarStats(){\n  document.getElementById('stat-live').textContent=allCards.filter(c=>c.state==='in').length;\n  document.getElementById('stat-final').textContent=allCards.filter(c=>c.state==='post').length;\n  document.getElementById('stat-up').textContent=allCards.filter(c=>c.state==='pre').length;\n}\nfunction filterLeague(lid,el){\n  activeLeague=lid;\n  document.querySelectorAll('.nav-item[data-league]').forEach(n=>n.classList.remove('active'));\n  el.classList.add('active');renderCards();\n}\nfunction setOnline(on){\n  isOnline=on;\n  const el=document.getElementById('netStatus'),txt=document.getElementById('netTxt');\n  el.className='net-status '+(on?'net-online':'net-offline');\n  txt.textContent=on?'Online':'Offline…';updateGlobalStatus();\n}\n\n/* ════════════════════════════════════════════\n   NEWS\n════════════════════════════════════════════ */\nconst NEWS_SOURCES=[\n  {label:'Commanders',league:'NFL',tag:'tag-nfl',primary:'#7A1B1B',secondary:'#FFB612',url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/news?team=28&limit=5'},\n  {label:'Wizards',league:'NBA',tag:'tag-nba',primary:'#002B5C',secondary:'#E31837',url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news?team=27&limit=6'},\n  {label:'Nationals',league:'MLB',tag:'tag-mlb',primary:'#AB0003',secondary:'#14225A',url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?team=21&limit=5'},\n  {label:'Capitals',league:'NHL',tag:'tag-nhl',primary:'#C8102E',secondary:'#041E42',url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/news?team=15&limit=5'},\n  {label:'Mystics',league:'WNBA',tag:'tag-wnba',primary:'#002B5C',secondary:'#E31837',url:'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/news?team=20&limit=4'},\n  {label:'Tottenham',league:'EPL',tag:'tag-epl',primary:'#132257',secondary:'#00B2F8',url:'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/news?team=367&limit=5'},\n];\n\nasync function fetchNews(){\n  try{\n    const results=await Promise.allSettled(NEWS_SOURCES.map(async s=>{\n      const r=await fetch(s.url,{signal:AbortSignal.timeout(8000)});\n      if(!r.ok)return[];\n      const d=await r.json();\n      return(d.articles||[]).map(a=>({...s,id:a.dataSourceIdentifier||Math.random().toString(),headline:a.headline||'',desc:a.description||'',published:a.published||'',link:(a.links&&a.links.web&&a.links.web.href)||'',img:(a.images&&a.images[0]&&a.images[0].url)||''}));\n    }));\n    allNews=[];results.forEach(r=>{if(r.status==='fulfilled')allNews.push(...r.value)});\n    allNews.sort((a,b)=>new Date(b.published)-new Date(a.published));\n    renderNews();\n  }catch(e){document.getElementById('news-grid').innerHTML='<div class=\"empty-state\" style=\"grid-column:1/-1\">📡 Could not load news. Check your connection.<\u002Fdiv>'}\n}\n\nfunction renderNewsFilters(){\n  const filters=document.getElementById('news-filters');\n  if(!filters)return;\n  const teams=NEWS_SOURCES.map(s=>s);\n  const counts={};allNews.forEach(n=>{counts[n.label]=(counts[n.label]||0)+1});\n  const allBtn=`<button class=\"date-filter ${activeNewsFilter==='all'?'active':''}\" onclick=\"filterNews('all',this)\">All Teams <span style=\"opacity:.55;margin-left:4px;font-family:'JetBrains Mono',monospace;font-size:10px\">${allNews.length||'—'}<\u002Fspan><\u002Fbutton>`;\n  const teamBtns=teams.map(s=>{\n    const c=counts[s.label]||0;\n    const isActive=activeNewsFilter===s.label;\n    const activeStyle=isActive?`border-color:${s.primary};color:${s.secondary||s.primary};background:${s.primary}28;`:'';\n    return `<button class=\"date-filter ${isActive?'active':''}\" onclick=\"filterNews('${s.label}',this)\" style=\"${activeStyle}\"><span style=\"display:inline-block;width:7px;height:7px;border-radius:50%;background:${s.primary};margin-right:6px;vertical-align:middle\"><\u002Fspan>${s.label} <span style=\"opacity:.55;margin-left:4px;font-family:'JetBrains Mono',monospace;font-size:10px\">${c||'—'}<\u002Fspan><\u002Fbutton>`;\n  }).join('');\n  filters.innerHTML=allBtn+teamBtns;\n}\n\nfunction filterNews(team,el){\n  activeNewsFilter=team;\n  renderNews();\n}\n\nfunction renderNews(){\n  const grid=document.getElementById('news-grid');\n  const count=document.getElementById('news-count');\n  renderNewsFilters();\n  if(!allNews.length){grid.innerHTML='<div class=\"empty-state\" style=\"grid-column:1/-1\">📰 No news articles found.<\u002Fdiv>';return}\n  const filtered=activeNewsFilter==='all'?allNews:allNews.filter(n=>n.label===activeNewsFilter);\n  if(count)count.textContent=filtered.length+' article'+(filtered.length!==1?'s':'')+(activeNewsFilter!=='all'?' · '+activeNewsFilter:'');\n  if(!filtered.length){grid.innerHTML='<div class=\"empty-state\" style=\"grid-column:1/-1\">📰 No news articles found for '+esc(activeNewsFilter)+'.<\u002Fdiv>';return}\n  grid.innerHTML=filtered.map(n=>{\n    const img=n.img?`<img class=\"news-img\" src=\"${esc(n.img)}\" loading=\"lazy\" onerror=\"this.style.display='none';this.nextElementSibling&&(this.nextElementSibling.style.display='flex')\">`:'';\n    const ph=`<div class=\"news-nophoto\" style=\"${!n.img?'':'display:none'}\">📰<\u002Fdiv>`;\n    const ts=`background:${n.primary}33;color:${n.secondary};`;\n    const la=n.link?`href=\"${esc(n.link)}\" target=\"_blank\" rel=\"noopener\"`:'';\n    return `<a class=\"news-card\" style=\"border-left-color:${n.primary}\" ${la}>${img}${ph}<div class=\"news-body\"><div class=\"news-meta\"><span class=\"news-tag\" style=\"${ts}\">${esc(n.label)}<\u002Fspan><span class=\"news-time\">${ago(n.published)}<\u002Fspan><\u002Fdiv><div class=\"news-headline\">${esc(n.headline)}<\u002Fdiv>${n.desc?`<div class=\"news-desc\">${esc(n.desc)}<\u002Fdiv>`:''}<\u002Fdiv><\u002Fa>`;\n  }).join('');\n}\n\n/* ════════════════════════════════════════════\n   DRAFT SECTION\n════════════════════════════════════════════ */\nconst WIZ_DRAFT={\n  pickNum:1,\n  draftDate:'June 23–24, 2026 — Barclays Center, Brooklyn, NY',\n  picks:[{r:1,n:1,own:true,note:'WON LOTTERY — 14% odds'},{r:2,n:51,own:true,note:'Via Minnesota Timberwolves'}],\n  desc:\"The Washington Wizards WON the 2026 NBA Draft Lottery on May 10 — picking #1 overall for the first time since John Wall in 2010. Washington went 17-65 (worst record in the NBA), then lost 26 of their final 27 games to maximize lottery positioning. John Wall represented the franchise on stage in Chicago. With Trae Young and Anthony Davis already acquired at the trade deadline, adding the #1 pick gives Washington a legitimate foundation to compete in the East.\"\n};\n\nasync function fetchDraftData(){\n  let fromAPI=[];\n  try{\n    const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/draft/prospects?limit=20',{signal:AbortSignal.timeout(6000)});\n    if(r.ok){const d=await r.json();const al=d.athletes||d.prospects||[];if(al.length)fromAPI=al.slice(0,8).map((a,i)=>({rank:a.ranking||(i+1),name:a.displayName||'Prospect',pos:(a.position&&a.position.abbreviation)||'—',school:a.college?.name||'—',ht:a.displayHeight||'—',wt:a.displayWeight||'—',age:'—',hometown:'—',yr:'Freshman',grade:i<2?'A':i<5?'B+':'B',highlights:[],note:'',stats:{},strengths:[],weaknesses:[],comparison:'—',overview:'See ESPN.com for full scouting report.',rankings:{espn:i+1,cbs:'—',br:'—'},proj:'TBD'}))}\n  }catch(e){}\n  // Always use curated data if available\n  window._draftProspects=fromAPI.length>0?fromAPI:PROSPECTS;\n  // Fetch draft news\n  try{\n    const r2=await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news?team=27&limit=8',{signal:AbortSignal.timeout(6000)});\n    if(r2.ok){const d2=await r2.json();window._draftNews=(d2.articles||[]).filter(a=>/draft|pick|prospect|lottery|dybantsa|peterson|boozer|wilson|combine/i.test((a.headline||'')+(a.description||''))).slice(0,5)}\n  }catch(e){}\n  renderDraft();\n}\n\nfunction renderDraft(){\n  const info=WIZ_DRAFT;\n  const chips=info.picks.map(p=>`<span class=\"chip ${p.own?'own':''}\">${p.own?'★ ':''}Rd ${p.r} · Pick #${p.n} — ${p.note}<\u002Fspan>`).join('');\n  const tabs=`<div class=\"draft-tabs\"><div class=\"dtab ${activeDraftTab==='prospects'?'active':''}\" onclick=\"switchDraftTab('prospects')\">Top Prospects<\u002Fdiv><div class=\"dtab ${activeDraftTab==='news'?'active':''}\" onclick=\"switchDraftTab('news')\">Draft News<\u002Fdiv><\u002Fdiv>`;\n  const prosp=window._draftProspects||PROSPECTS;\n  const prospHtml=`<div class=\"dpanel ${activeDraftTab==='prospects'?'active':''}\" id=\"dpanel-prospects\">\n    <div style=\"margin-bottom:10px;font-size:12px;color:var(--text-dim)\">★ = Wizards projected target · Rankings: ESPN · CBS Sports · Bleacher Report · Post-lottery May 11 2026 · Click any card for detailed scouting report<\u002Fdiv>\n    <div class=\"prospects-grid\">${prosp.map((p,i)=>renderProspectCard(p,i)).join('')}<\u002Fdiv>\n  <\u002Fdiv>`;\n  const news=window._draftNews||[];\n  const newsHtml=`<div class=\"dpanel ${activeDraftTab==='news'?'active':''}\" id=\"dpanel-news\">\n    ${news.length?news.map(a=>{const lnk=(a.links&&a.links.web&&a.links.web.href)||'';return`<a class=\"draft-news-item\" href=\"${esc(lnk)}\" target=\"_blank\" rel=\"noopener\"><div class=\"dni-hl\">${esc(a.headline||'')}<\u002Fdiv><div class=\"dni-desc\">${esc((a.description||'').slice(0,180))}${(a.description||'').length>180?'…':''}<\u002Fdiv><div class=\"dni-time\">${ago(a.published)}<\u002Fdiv><\u002Fa>`}).join(''):'<div class=\"empty-state\">📰 No draft-specific news found. Check the News tab for recent Wizards coverage.<\u002Fdiv>'}\n  <\u002Fdiv>`;\n  document.getElementById('draft-content').innerHTML=`\n    <div class=\"draft-hero\">\n      <div class=\"pick-badge\"><div class=\"pick-num\">#${info.pickNum}<\u002Fdiv><div class=\"pick-lbl\">Overall<\u002Fdiv><\u002Fdiv>\n      <div class=\"draft-info\">\n        <div class=\"draft-title\">Washington Wizards — 2026 NBA Draft<\u002Fdiv>\n        <div class=\"draft-date-str\">📅 ${info.draftDate}<\u002Fdiv>\n        <div class=\"draft-desc\">${info.desc}<\u002Fdiv>\n        <div class=\"draft-chips\">${chips}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"countdown-hero\" id=\"draft-countdown\"><\u002Fdiv>\n    <div class=\"combine-banner\">🏟️ <strong style=\"color:var(--cmd-gold)\">NBA Draft Combine in progress<\u002Fstrong> — May 10–17 · Wintrust Arena &amp; Marriott Marquis, Chicago · NCAA Withdrawal Deadline: <strong style=\"color:var(--cmd-gold)\">May 27<\u002Fstrong> · Prospects data sourced from ESPN · CBS Sports · Bleacher Report (May 11, 2026)<\u002Fdiv>\n    ${tabs}${prospHtml}${newsHtml}`;\n  updateDraftCountdown();\n}\n\nfunction renderProspectCard(p,idx){\n  const isTarget=p.rank===1;\n  const gradeClass=p.grade==='A'?'gA':p.grade==='A-'?'gAm':p.grade==='B+'?'gBp':'gB';\n  const attrs=(p.highlights||[]).map((h,i)=>`<span class=\"attr ${i===0?'hi':''}\">${esc(h)}<\u002Fspan>`).join('');\n  return `<div class=\"prospect-card\" onclick=\"openModal(${idx})\" ${isTarget?'style=\"border-color:rgba(255,182,18,.35)\"':''}>\n    <div class=\"p-grade ${gradeClass}\">${esc(p.grade||'')}<\u002Fdiv>\n    <div class=\"p-rank\">${isTarget?'★ WIZ TARGET':'#'+p.rank+' Overall'}<\u002Fdiv>\n    <div class=\"p-name\">${esc(p.name)}<\u002Fdiv>\n    <div class=\"p-meta\"><span class=\"p-pos\">${esc(p.pos)}<\u002Fspan>${p.school&&p.school!=='—'?' · '+esc(p.school):''}${p.ht&&p.ht!=='—'?' · '+esc(p.ht):''}<\u002Fdiv>\n    ${attrs?`<div class=\"p-attrs\">${attrs}<\u002Fdiv>`:''}\n    ${p.note?`<div class=\"p-note\">${esc(p.note)}<\u002Fdiv>`:''}\n    <div class=\"p-view-more\">View scouting report →<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction switchDraftTab(tab){activeDraftTab=tab;renderDraft()}\n\n/* ════════════════════════════════════════════\n   PROSPECT MODAL\n════════════════════════════════════════════ */\nfunction openModal(idx){\n  const prosp=window._draftProspects||PROSPECTS;\n  const p=prosp[idx];if(!p)return;\n  const gradeClass=p.grade==='A'?'gA':p.grade==='A-'?'gAm':p.grade==='B+'?'gBp':'gB';\n  const st=p.stats||{};\n  const statGrid=[\n    {v:st.pts||'—',l:'PPG'},{v:st.reb||'—',l:'RPG'},{v:st.ast||'—',l:'APG'},{v:st.gp||'—',l:'GP'},\n    {v:st.fg?st.fg+'%':'—',l:'FG%'},{v:st.fg3?st.fg3+'%':'—',l:'3P%'},{v:st.ft?st.ft+'%':'—',l:'FT%'},\n  ].map(s=>`<div class=\"stat-box\"><div class=\"stat-val\">${esc(String(s.v))}<\u002Fdiv><div class=\"stat-lbl\">${s.l}<\u002Fdiv><\u002Fdiv>`).join('');\n  const strs=(p.strengths||[]).map(s=>`<li>${esc(s)}<\u002Fli>`).join('');\n  const wks=(p.weaknesses||[]).map(w=>`<li>${esc(w)}<\u002Fli>`).join('');\n  const rnks=p.rankings||{};\n  document.getElementById('modalCard').innerHTML=`\n    <div class=\"modal-hdr\">\n      <button class=\"modal-close\" onclick=\"document.getElementById('prospectModal').classList.remove('open')\">✕<\u002Fbutton>\n      <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap\">\n        <div class=\"modal-player-name\">${esc(p.name)}<\u002Fdiv>\n        <span class=\"p-grade ${gradeClass}\" style=\"font-size:24px;position:static\">${esc(p.grade||'')}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"modal-player-sub\"><span style=\"color:var(--cmd-gold);font-weight:600\">${esc(p.pos)}<\u002Fspan> · ${esc(p.school||'—')} · ${esc(p.yr||'Freshman')} · ${esc(p.ht||'—')}, ${esc(p.wt||'—')}<\u002Fdiv>\n      <div class=\"modal-rank-row\">\n        <span class=\"rank-chip proj\">${esc(p.proj||'TBD')}<\u002Fspan>\n        ${rnks.espn?`<span class=\"rank-chip src\">ESPN #${rnks.espn}<\u002Fspan>`:''}\n        ${rnks.cbs?`<span class=\"rank-chip src\">CBS #${rnks.cbs}<\u002Fspan>`:''}\n        ${rnks.br?`<span class=\"rank-chip src\">BR #${rnks.br}<\u002Fspan>`:''}\n        ${p.comparison?`<span class=\"rank-chip src\">Comp: ${esc(p.comparison)}<\u002Fspan>`:''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"modal-left\">\n        <div class=\"modal-section-title\">Season Stats (College)<\u002Fdiv>\n        <div class=\"stat-grid\">${statGrid}<\u002Fdiv>\n        <div class=\"modal-section-title\">Measurements<\u002Fdiv>\n        <table class=\"phys-table\"><tbody>\n          <tr><td>Height<\u002Ftd><td>${esc(p.ht||'—')}<\u002Ftd><\u002Ftr>\n          <tr><td>Weight<\u002Ftd><td>${esc(p.wt||'—')}<\u002Ftd><\u002Ftr>\n          <tr><td>Age<\u002Ftd><td>${esc(p.age||'—')}<\u002Ftd><\u002Ftr>\n          <tr><td>Hometown<\u002Ftd><td>${esc(p.hometown||'—')}<\u002Ftd><\u002Ftr>\n          <tr><td>School<\u002Ftd><td>${esc(p.school||'—')}<\u002Ftd><\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n        <div class=\"comparison-badge\" style=\"margin-top:12px\">🏀 Comp: ${esc(p.comparison||'—')}<\u002Fdiv>\n        ${(rnks.espn||rnks.cbs||rnks.br)?`<div class=\"modal-section-title\" style=\"margin-top:14px\">Multi-Source Rankings<\u002Fdiv>\n        <div class=\"rank-row-modal\">\n          ${rnks.espn?`<div class=\"rank-src\"><div class=\"rank-src-num\">#${rnks.espn}<\u002Fdiv><div class=\"rank-src-lbl\">ESPN<\u002Fdiv><\u002Fdiv>`:''}\n          ${rnks.cbs?`<div class=\"rank-src\"><div class=\"rank-src-num\">#${rnks.cbs}<\u002Fdiv><div class=\"rank-src-lbl\">CBS<\u002Fdiv><\u002Fdiv>`:''}\n          ${rnks.br?`<div class=\"rank-src\"><div class=\"rank-src-num\">#${rnks.br}<\u002Fdiv><div class=\"rank-src-lbl\">BR<\u002Fdiv><\u002Fdiv>`:''}\n        <\u002Fdiv>`:''}\n      <\u002Fdiv>\n      <div class=\"modal-right\">\n        ${strs?`<div class=\"modal-section-title\">Strengths<\u002Fdiv><ul class=\"str-list\" style=\"list-style:none;margin-bottom:14px\">${strs}<\u002Ful>`:''}\n        ${wks?`<div class=\"modal-section-title\">Areas to Develop<\u002Fdiv><ul class=\"wk-list\" style=\"list-style:none;margin-bottom:14px\">${wks}<\u002Ful>`:''}\n        ${p.overview?`<div class=\"modal-section-title\">Scouting Overview<\u002Fdiv><div class=\"modal-overview\">${esc(p.overview)}<\u002Fdiv>`:''}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  document.getElementById('prospectModal').classList.add('open');\n}\n\nfunction closeModal(e){\n  if(e.target===document.getElementById('prospectModal'))document.getElementById('prospectModal').classList.remove('open');\n}\ndocument.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('prospectModal').classList.remove('open')});\n\n/* ════════════════════════════════════════════\n   KEY DATES\n════════════════════════════════════════════ */\nfunction renderDates(){\n  const teams=[...new Set(KEY_DATES.map(d=>d.team))];\n  const filters=document.getElementById('dates-filters');\n  const allBtn=`<button class=\"date-filter ${activeDatesFilter==='all'?'active':''}\" onclick=\"filterDates('all',this)\">All Teams<\u002Fbutton>`;\n  const teamBtns=teams.map(t=>{const d=KEY_DATES.find(k=>k.team===t);return`<button class=\"date-filter ${activeDatesFilter===t?'active':''}\" onclick=\"filterDates('${t}',this)\" style=\"${activeDatesFilter===t?`border-color:${d.primary};color:${d.primary};background:${d.primary}18;`:''}\">${t}<\u002Fbutton>`}).join('');\n  filters.innerHTML=allBtn+teamBtns;\n\n  const now=new Date();now.setHours(0,0,0,0);\n  const filtered=activeDatesFilter==='all'?KEY_DATES:KEY_DATES.filter(d=>d.team===activeDatesFilter);\n  document.getElementById('dates-count').textContent=filtered.length+' events';\n\n  const sorted=[...filtered].sort((a,b)=>{\n    const order={completed:0,today:1,upcoming:2};\n    if(order[a.status]!==order[b.status])return order[a.status]-order[b.status];\n    return new Date(a.date)-new Date(b.date);\n  });\n\n  document.getElementById('dates-list').innerHTML=sorted.map(d=>{\n    const dt=new Date(d.date+'T12:00:00');\n    const mon=dt.toLocaleString('en-US',{month:'short'}).toUpperCase();\n    const day=dt.getDate();\n    const yr=dt.getFullYear();\n    const diffDays=Math.round((dt-now)/86400000);\n    let statusHtml='',daysHtml='';\n    if(d.status==='completed'){statusHtml=`<span class=\"date-status ds-done\">Done<\u002Fspan>`;daysHtml=''}\n    else if(d.status==='today'){statusHtml=`<span class=\"date-status ds-today\">TODAY<\u002Fspan>`;daysHtml=''}\n    else if(diffDays<=7){statusHtml=`<span class=\"date-status ds-soon\">Soon<\u002Fspan>`;daysHtml=`<div class=\"days-away\">${diffDays}d away<\u002Fdiv>`}\n    else{statusHtml=`<span class=\"date-status ds-upcoming\">Upcoming<\u002Fspan>`;daysHtml=`<div class=\"days-away\">${diffDays}d away<\u002Fdiv>`}\n    const ts=`background:${d.primary}28;color:${d.secondary};`;\n    return `<div class=\"date-card ${d.status==='completed'?'completed':''}\" style=\"border-left-color:${d.primary}\">\n      <div class=\"date-left\"><div class=\"date-month\">${mon}<\u002Fdiv><div class=\"date-day\">${day}<\u002Fdiv><div class=\"date-year\">${yr}<\u002Fdiv><\u002Fdiv>\n      <div class=\"date-right\">\n        <span class=\"date-team-tag\" style=\"${ts}\">${d.team} · ${d.league}<\u002Fspan>\n        <div class=\"date-label\">${d.label}<\u002Fdiv>\n        <div class=\"date-desc\">${esc(d.desc)}<\u002Fdiv>\n        ${daysHtml}\n      <\u002Fdiv>\n      <div class=\"date-badge\">${statusHtml}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction filterDates(team,el){\n  activeDatesFilter=team;\n  document.querySelectorAll('.date-filter').forEach(b=>b.classList.remove('active'));\n  el.classList.add('active');renderDates();\n}\n\n/* ════════════════════════════════════════════\n   UTILS\n════════════════════════════════════════════ */\nfunction esc(s){return String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\nfunction ago(dateStr){\n  if(!dateStr)return'';const diff=Date.now()-new Date(dateStr).getTime();\n  const m=Math.floor(diff/60000);\n  if(m<1)return'just now';if(m<60)return m+'m ago';\n  const h=Math.floor(m/60);if(h<24)return h+'h ago';\n  return Math.floor(h/24)+'d ago';\n}\nfunction setSpinning(on){document.getElementById('refreshBtn').classList.toggle('spinning',on)}\nfunction manualRefresh(){resetCountdown();fetchAll();fetchNews();fetchDraftData()}\n\n/* ════════════════════════════════════════════\n   INIT\n════════════════════════════════════════════ */\nwindow.addEventListener('online',()=>setOnline(true));\nwindow.addEventListener('offline',()=>setOnline(false));\nfetchAll();\nfetchNews();\nfetchDraftData();\nrenderDates();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
